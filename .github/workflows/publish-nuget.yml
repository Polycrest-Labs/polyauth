name: Publish NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build, pack, and publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PolyAuth.slnx

      - name: Build
        run: dotnet build PolyAuth.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/PolyAuth/PolyAuth.csproj --configuration Release --no-build --output artifacts/packages

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: hankbeasley

      - name: Push package
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
